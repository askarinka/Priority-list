<tr data-id="{{ task.id }}">
    <td>{{ task.project }}</td>
    <td>{{ task.description }}</td>
    <td class="actions">
        <button hx-post="{% url 'task_delete' task.id %}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Закрыть проект?">✓</button>
        <button hx-get="{% url 'task_edit_form' task.id %}"
                hx-target="closest tr"
                hx-swap="outerHTML">✎</button>
    </td>
</tr>
