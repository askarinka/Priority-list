<tr data-id="{{ task.id }}">
    <td>{{ task.project }}</td>
    <td>{{ task.reason }}</td>
    <td class="actions">
        <button hx-post="{% url 'waiting_delete' task.id %}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Удалить из ожидания?">✓</button>
        <button hx-get="{% url 'waiting_edit_form' task.id %}"
                hx-target="closest tr"
                hx-swap="outerHTML">✎</button>
    </td>
</tr>
