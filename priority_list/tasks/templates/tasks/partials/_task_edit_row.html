<tr data-id="{{ task.id }}">
    <td><textarea name="project">{{ task.project }}</textarea></td>
    <td><textarea name="description">{{ task.description }}</textarea></td>
    <td class="duration">
        <input type="number" name="duration_hours" value="{{ task.duration_hours }}" min="0" style="width:3em"> ч
        <input type="number" name="duration_minutes" value="{{ task.duration_minutes }}" min="0" style="width:3em"> м
    </td>
    <td class="actions">
        <button hx-post="{% url 'task_edit' task.id %}"
                hx-include="closest tr"
                hx-target="closest tr"
                hx-swap="outerHTML">✓</button>
        <button hx-get="{% url 'task_row' task.id %}"
                hx-target="closest tr"
                hx-swap="outerHTML">✗</button>
    </td>
</tr>
