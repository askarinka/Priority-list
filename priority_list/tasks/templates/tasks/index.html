{% extends 'tasks/base.html' %}
{% block title %}PrioList{% endblock %}
{% block content %}
<div class="container">
    <div class="toolbar">
        <button hx-get="{% url 'task_add_form' %}"
                hx-target="#task-tbody"
                hx-swap="beforeend">+ Добавить</button>
        <a href="{% url 'waiting_index' %}" class="btn">Ожидание</a>
    </div>
    <table class="task-table">
        <thead>
            <tr>
                <th>Проект</th>
                <th>Описание задачи</th>
                <th>Время</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="task-tbody">
            {% for task in tasks %}
                {% include 'tasks/partials/_task_row.html' %}
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
    Sortable.create(document.getElementById('task-tbody'), {
        animation: 150,
        filter: 'input, textarea, button',
        preventOnFilter: false,
        onEnd: function () {
            const rows = document.querySelectorAll('#task-tbody tr[data-id]');
            const formData = new FormData();
            rows.forEach(row => formData.append('ids', row.dataset.id));
            fetch("{% url 'task_reorder' %}", {
                method: 'POST',
                headers: {'X-CSRFToken': getCsrfToken()},
                body: formData,
            }).catch(console.error);
        },
    });
</script>
{% endblock %}
